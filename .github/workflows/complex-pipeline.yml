name: Monolithic CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  IMAGE_NAME: my-cool-app
  # تأكد من مطابقة اسم الملف في مستودعك
  DOCKER_FILE: Dockerfile 

jobs:
  # المرحلة الأولى: التحقق (CI)
  test-logic:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # قمنا بحذف الـ pip install بناءً على طلبك لعدم وجود ملف requirements
      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  # المرحلة الثانية: البناء (Build) - تعتمد على نجاح الاختبارات
  build-and-package:
    needs: test-logic
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # هنا نقوم بتمرير الـ ARG وتصدير الصورة كملف .tar
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./${{ env.DOCKER_FILE }}
          # تمرير الـ ARG المطلوب من هنا
          build-args: |
            BASE_IMAGE=python:3.11-slim
          tags: ${{ env.IMAGE_NAME }}:latest
          # حفظ الصورة في ملف مؤقت داخل الـ Runner
          outputs: type=docker,dest=/tmp/${{ env.IMAGE_NAME }}.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-image
          path: /tmp/${{ env.IMAGE_NAME }}.tar
          retention-days: 1

  # المرحلة الثالثة: التشغيل والاختبار (Deploy & Smoke Test)
  run-and-verify:
    needs: build-and-package
    runs-on: ubuntu-latest
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: built-image
          path: /tmp

      - name: Load Docker image
        run: docker load --input /tmp/${{ env.IMAGE_NAME }}.tar

      - name: Start container
        run: |
          docker run -d \
            --name test-container \
            -p 8000:8000 \
            "${{ env.IMAGE_NAME }}:latest"

      # اختبار الدخان للتأكد أن التطبيق استجاب
      - name: Smoke test
        run: |
          echo "Waiting for app to wake up..."
          sleep 5
          if curl --fail --silent http://127.0.0.1:8000/health; then
            echo "Success: App is responding!"
            exit 0
          else
            echo "Failure: App is not responding!"
            docker logs test-container
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: docker rm -f test-container || true